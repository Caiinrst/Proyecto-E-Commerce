<div class="login-page">
  <div class="login-card">
    <div class="login-header">
      <span class="shield-icon">🤖</span>
      <h2>Acceso al Hangar</h2>
      <p>Ingresa tus credenciales de piloto</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onLogin()">
      <div class="form-group">
        <label>Email</label>
        <div class="input-wrapper">
          <span class="icon">📧</span>
          <input type="email" formControlName="email" placeholder="piloto@mechastore.com">
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="input-wrapper">
          <span class="icon">🔒</span>
          <input type="password" formControlName="password" placeholder="********">
        </div>
      </div>

      <button type="submit" [disabled]="loginForm.invalid" class="btn-login">
        🚀 Entrar al Sistema
      </button>

      <div *ngIf="errorMessage" class="error-box">
        {{ errorMessage }}
      </div>
    </form>

    <div class="login-footer">
      <p>¿No tienes cuenta? <a routerLink="/user-registration">Regístrate aquí</a></p>
    </div>
  </div>
</div>
