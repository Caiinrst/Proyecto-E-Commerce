<div class="registration-container">
  <h2 class="registration-title">🤖 Registro de Piloto</h2>
  <p class="registration-subtitle">Crea tu cuenta para acceder al hangar y personalizar tus Mechas.</p>

  <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="hero-form">
    <!-- Nombre -->
    <div class="form-group">
      <label>Nombre Completo</label>
      <div class="input-wrapper">
        <span class="icon">👤</span>
        <input type="text" formControlName="nombre" placeholder="Ej. Shinji Ikari">
      </div>
      <span class="error" *ngIf="registerForm.get('nombre')?.invalid && registerForm.get('nombre')?.touched">
        ⚠️ El nombre es requerido (mín. 3 caracteres).
      </span>
    </div>

    <!-- Email -->
    <div class="form-group">
      <label>Correo Electrónico</label>
      <div class="input-wrapper">
        <span class="icon">📧</span>
        <input type="email" formControlName="email" placeholder="piloto@mechastore.com">
      </div>
      <span class="error" *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched">
        ⚠️ Ingresa un correo válido.
      </span>
    </div>

    <!-- Password -->
    <div class="form-group">
      <label>Contraseña</label>
      <div class="input-wrapper">
        <span class="icon">🔒</span>
        <input type="password" formControlName="password" placeholder="******">
      </div>
      <span class="error" *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched">
        ⚠️ Mínimo 6 caracteres.
      </span>
    </div>

    <!-- Botón -->
    <button type="submit" [disabled]="registerForm.invalid" class="btn-submit">
      🚀 Crear Cuenta
    </button>

    <!-- Feedback -->
    <div *ngIf="message" [ngClass]="{'msg-success': !isError, 'msg-error': isError}" class="feedback">
      {{ message }}
    </div>
  </form>
</div>
