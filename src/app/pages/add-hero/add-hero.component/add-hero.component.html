<div class="add-hero-container">
  <div class="form-header">
    <h3>🤖 Ensamblar Nuevo Mecha</h3>
    <p>Completa los datos para añadir un Mecha al catálogo.</p>
  </div>

  <div class="main-layout">
    <!-- Previsualización -->
    <div class="preview-section">
      <div class="preview-card">
        <div class="image-container">
          <img [src]="fullImagePath" alt="Vista previa">
        </div>
        <div class="preview-info">
          <h4>{{ heroData.nombre || 'Nombre del Mecha' }}</h4>
          <span>{{ heroData.poder || 'Armamento / Habilidad' }}</span>
        </div>
      </div>
    </div>

    <!-- Formulario -->
    <form (ngSubmit)="onSubmit()" #heroForm="ngForm" class="hero-form">
      <div class="form-group">
        <label>Nombre del Mecha</label>
        <input type="text" [(ngModel)]="heroData.nombre" name="nombre" required placeholder="Ej. Gundam RX-78-2">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Armamento / Habilidad Principal</label>
          <input type="text" [(ngModel)]="heroData.poder" name="poder" required placeholder="Ej. Rifle de Haz y Sable de Luz">
        </div>
        <div class="form-group">
          <label>Blindaje / Fortaleza</label>
          <input type="text" [(ngModel)]="heroData.fortaleza" name="fortaleza" required placeholder="Ej. Resistencia extrema al calor">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Propulsión / Resistencia</label>
          <input type="text" [(ngModel)]="heroData.resistencia" name="resistencia" required placeholder="Ej. Propulsores de alta maniobrabilidad">
        </div>
        <div class="form-group">
          <label>Punto Débil / Debilidad</label>
          <input type="text" [(ngModel)]="heroData.debilidad" name="debilidad" required placeholder="Ej. Vulnerabilidad a pulsos electromagnéticos (EMP)">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Precio ($ USD)</label>
          <input type="number" step="0.01" [(ngModel)]="heroData.precio" name="precio" required min="0">
        </div>
        <div class="form-group">
          <label>Existencias (Stock)</label>
          <input type="number" [(ngModel)]="heroData.stock" name="stock" required min="0">
        </div>
      </div>

      <div class="form-group">
        <label>Seleccionar Imagen del Repositorio Local</label>
        <div class="custom-file-upload">
          <input type="file" #fileInput (change)="onFileSelected($event)" accept="image/*" style="display: none;">
          <button type="button" class="btn-browse" (click)="fileInput.click()">🔍 Buscar en assets/images</button>
          <span class="file-name" *ngIf="fileNameSelected">📄 {{ fileNameSelected }}</span>
        </div>
        <small>Nota: La imagen debe existir físicamente en <code>src/assets/images/</code></small>
      </div>

      <button type="submit" [disabled]="!heroForm.valid" class="btn-submit">🚀 Guardar Mecha</button>
    </form>
  </div>
</div>
